server {
    listen 8080;
    root ./www;
    client_max_body_size 1m;
    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;
    error_page 500 /errors/500.html;

    location / {
        methods GET;
        autoindex on;
        index index.html;
    }

    location /post_body {
        methods POST;
        client_max_body_size 100;
    }

    # location /directory {
    # methods GET;
    # return 301 /directory/;
    # }

    location /directory/ {
        methods GET;
        root ./YoupiBanane;
        index youpi.bad_extension;
    }

    location /cgi-bin {
        methods POST;
        cgi_ext .bla;
    }
}
