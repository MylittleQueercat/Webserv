server {
    listen 8080;
    root /var/www/html;
    client_max_body_size 1m;
    error_page 404 /404.html;

    location / {
        methods GET POST;
        autoindex on;
        index index.html;
    }

    location /upload {
        methods POST DELETE;
        upload_store /tmp/uploads;
    }

    location /cgi-bin {
        methods GET POST;
        cgi_ext .py;
    }
}