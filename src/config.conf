server {
    listen 8080;
    root ./www;
    client_max_body_size 1m;
    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;
    error_page 500 /errors/500.html;
    error_page 400 /errors/400.html;
    error_page 403 /errors/403.html;

    location / {
        methods GET POST;
        autoindex on;
        index index.html;
    }

    location /upload {
        methods POST DELETE;
        upload_store ./uploads;
    }

    location /cgi-bin {
        root ./tests;          # ← 加这一行
        methods GET POST;
        cgi_ext .py;
    }
}

server {
    listen 9090;
    root ./www;
    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;
    error_page 500 /errors/500.html;
    error_page 400 /errors/400.html;
    error_page 403 /errors/403.html;

    location / {
        methods GET;
        index index.html;
    }
}